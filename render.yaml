# Render Blueprint — root of repo
services:
  - type: web
    name: breathe-esg-api
    runtime: python
    rootDir: backend
    plan: free
    # Inline build avoids Windows CRLF issues with build.sh on some machines
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate --no-input && python manage.py seed_data
    startCommand: gunicorn breatheesg.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DJANGO_SETTINGS_MODULE
        value: breatheesg.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://REPLACE-WITH-YOUR-VERCEL-URL.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: breathe-esg-db
          property: connectionString

databases:
  - name: breathe-esg-db
    plan: free
