# Optional: deploy entire stack from Render dashboard via Blueprint
# Dashboard → New → Blueprint → connect repo (uses this file)
services:
  - type: web
    name: breathe-esg-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn breatheesg.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: breatheesg.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: breathe-esg-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://REPLACE-WITH-YOUR-VERCEL-URL.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: breathe-esg-db
          property: connectionString

databases:
  - name: breathe-esg-db
    plan: free
